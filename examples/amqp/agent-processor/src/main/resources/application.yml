spring:
  main:
    web-application-type: none
  rabbitmq:
    host: localhost
    port: 5672
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-5-20250929
    agent:
      serve:
        amqp:
          request-queue: agent-requests
          answer-queue: agent-answers
          events-exchange: agent-events
